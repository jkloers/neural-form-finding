name: nff-sofa-oracle
version: "0.1.0"
description: |
  High-fidelity SOFA physics oracle for the Neural Form-Finding (NFF) pipeline.

  Simulates a 1×1 kirigami unit cell (4 rigid faces + 4 filament hinges) using
  SOFA v25.12 BeamFEM and returns the filament strain energy at static equilibrium.
  Gradients are computed via central finite differences, making this oracle
  plug-and-play with JAX via the Tesseract interface.

  Phase 2 — scalar inputs (filament geometry + applied displacement).
  Phase 3 will extend inputs to full face geometry from NFF CentroidalState.

build_config:
  # Ubuntu/Debian base with Python 3.12 — matches local kgnn_sofa SOFA environment.
  # Python version must match the SOFA Linux binary (v25.12 / Python 3.12 variant).
  base_image: "python:3.12-slim"

  # SOFA Linux binaries are x86_64 only. The Tesseract container always runs
  # on linux/amd64 regardless of the host machine architecture.
  target_platform: "linux/amd64"

  # System packages required by SOFA:
  #   libgomp1  — OpenMP runtime (SOFA uses multi-threaded assembly)
  #   wget/unzip — for downloading and extracting the SOFA binary in the build step
  extra_packages:
    - wget
    - unzip
    - libgomp1
    - libgl1            # headless OpenGL stub (some SOFA plugins probe for it)
    - libglib2.0-0      # glib runtime, pulled in by several SOFA shared libs

  # Copy the SOFA physics core into the container root.
  # tesseract_api.py imports simulate_cell via `import simulate_cell`.
  package_data:
    - ["sofa/simulate_cell.py", "simulate_cell.py"]

  custom_build_steps:
    # ── Download and install SOFA v25.12 Linux / Python 3.12 binary ────────────
    # The binary is ~300 MB. It contains the full SOFA framework and the
    # SofaPython3 plugin pre-built against CPython 3.12.
    #
    # SOFA does not ship a pip wheel, so we fetch the pre-compiled archive
    # directly from GitHub Releases and extract it to /opt/sofa.
    - |
      RUN wget -q \
            "https://github.com/sofa-framework/sofa/releases/download/v25.12.00/SOFA_v25.12.00_Linux-Python_3.12.zip" \
            -O /tmp/sofa.zip \
          && unzip -q /tmp/sofa.zip -d /opt \
          && mv /opt/SOFA_v25.12.00_Linux-Python_3.12 /opt/sofa \
          && rm /tmp/sofa.zip

    # ── Wire SOFA into the Python path ─────────────────────────────────────────
    # PYTHONPATH makes `import Sofa` work for any Python process in the container.
    # LD_LIBRARY_PATH lets the dynamic linker find SOFA's shared libraries when
    # the SofaPython3 .so files are loaded by the Python interpreter.
    - |
      ENV SOFA_ROOT=/opt/sofa
      ENV PYTHONPATH=/opt/sofa/plugins/SofaPython3/lib/python3/site-packages:${PYTHONPATH}
      ENV LD_LIBRARY_PATH=/opt/sofa/lib:/opt/sofa/plugins/SofaPython3/lib:${LD_LIBRARY_PATH}

    # ── Verify the SOFA import at build time ───────────────────────────────────
    # Fails the Docker build immediately if the binary or env wiring is broken,
    # rather than surfacing errors at runtime.
    - |
      RUN python -c "import Sofa; import Sofa.Core; import Sofa.Simulation; print('SOFA import OK')"
