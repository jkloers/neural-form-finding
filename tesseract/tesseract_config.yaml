name: nff-sofa-oracle
version: "0.2.0"
description: |
  High-fidelity SOFA physics oracle for the Neural Form-Finding (NFF) pipeline.

  Simulates a 1×1 kirigami unit cell (4 rigid faces + 4 volumetric hinge strips)
  using SOFA v25.12 HexahedronFEMForceField (corotational large) and returns four
  mechanical quantities at static equilibrium: SvK strain energy, peak von Mises
  stress, peak out-of-plane displacement, and first-yield fraction.
  Gradients are computed via central finite differences (6 SOFA calls per gradient).

  Phase 3a — HexahedronFEM inputs (hinge_arm_width, hinge_fold_length,
  applied_displacement) + material constants.
  Phase 4 will connect face_centroids from NFF CentroidalState as differentiable
  inputs and use strain_energy as a training reward signal.

build_config:
  # Ubuntu/Debian base with Python 3.12 — matches local kgnn_sofa SOFA environment.
  # Python version must match the SOFA Linux binary (v25.12 / Python 3.12 variant).
  base_image: "python:3.12-slim"

  # SOFA Linux binaries are x86_64 only. The Tesseract container always runs
  # on linux/amd64 regardless of the host machine architecture.
  target_platform: "linux/amd64"

  # System packages required by SOFA:
  #   libgomp1  — OpenMP runtime (SOFA uses multi-threaded assembly)
  #   wget/unzip — for downloading and extracting the SOFA binary in the build step
  extra_packages:
    - wget
    - unzip
    - libgomp1
    - libgl1            # headless OpenGL stub (some SOFA plugins probe for it)
    - libglib2.0-0      # glib runtime, pulled in by several SOFA shared libs

  # Copy the SOFA physics core into the container root.
  # tesseract_api.py imports simulate_cell via `import simulate_cell`.
  # simulate_cell.py is kept in sofa/ for development but copied to tesseract/
  # so it lands in __tesseract_source__ (the Docker build context).
  # package_data paths are relative to the tesseract/ directory.
  package_data:
    - ["simulate_cell.py", "simulate_cell.py"]

  custom_build_steps:
    # ── Download and install SOFA v25.12 Linux / Python 3.12 binary ────────────
    # SOFA does not ship a pip wheel — fetch the pre-compiled archive from
    # GitHub Releases and extract to /opt/sofa (~300 MB download).
    - |
      RUN wget -q \
            "https://github.com/sofa-framework/sofa/releases/download/v25.12.00/SOFA_v25.12.00_Linux-Python_3.12.zip" \
            -O /tmp/sofa.zip \
          && unzip -q /tmp/sofa.zip -d /opt \
          && mv /opt/SOFA_v25.12.00_Linux* /opt/sofa \
          && rm /tmp/sofa.zip

    # ── Wire SOFA into the Python path ─────────────────────────────────────────
    # Use explicit values (no variable expansion) to avoid Dockerfile warnings
    # about undefined $PYTHONPATH / $LD_LIBRARY_PATH at build time.
    - |
      ENV SOFA_ROOT=/opt/sofa
      ENV PYTHONPATH=/opt/sofa/plugins/SofaPython3/lib/python3/site-packages
      ENV LD_LIBRARY_PATH=/opt/sofa/lib:/opt/sofa/plugins/SofaPython3/lib

    # ── Verify the SOFA import at build time ───────────────────────────────────
    # Fails the build immediately if the binary or env wiring is broken.
    - |
      RUN python -c "import Sofa; import Sofa.Core; import Sofa.Simulation; print('SOFA import OK')"
