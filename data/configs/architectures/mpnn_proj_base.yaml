# Baseline: MPNN + alternating projections (n_proj_iters=100, num_layers=3)
# Validated on suite_compressive — 10/10 problems converge (2026-06-04).
#
# ── Key design decisions ──────────────────────────────────────────────────────
# coverage = 1.0     — symmetric Chamfer. chamfer_loss = precision + 1*recall.
#                      Setting coverage = chamfer inflates recall by chamfer²,
#                      causing the training to plateau on recall while precision
#                      stagnates. Always keep coverage = 1.0.
#
# hinge_gap = 200    — prevents the MPNN from opening large centroid gaps while
#                      pursuing chamfer. Alternating projections fix CNVs only;
#                      without this constraint the MPNN freely moves centroids
#                      to fit the circle, opening hinge gaps of >1 face-length
#                      that cause physics NaN. Balance point: ~0.1-unit max gap.
#
# void_closure = 50  — closure delta reward: -w * log1p(void_stage1 - void_stage2).
#                      Rewards the decrease in void area from Stage 1 (reference)
#                      to Stage 2 (deformed). A rigid-body swing around the clamp
#                      leaves void area unchanged (delta=0, no reward). Genuine
#                      kirigami closing reduces void area (delta>0, positive reward).
#                      This simultaneously encourages the reference to be open AND
#                      the loads to close the apertures — replacing both `openness`
#                      and the deprecated `deformation` term in a single gradient.
#
# deformation = 0    — deprecated. `mean_sq_disp` rewards rigid-body swing around
#                      a clamp (large absolute displacement, no void closure). The
#                      closure_delta reward replaces it entirely.
#
# contact = 0        — off by default; contact energy destabilises early training.
# num_layers = 3     — 3 hops gives hub faces (2,7,9,12) a 3-hop chamfer gradient
#                      path from boundary faces. 2 layers was insufficient.

tessellation:
  width: 2
  height: 2
  pattern: "unit_RDQK_D"
  total_area: 3.0

target:
  type: "circle"
  center: [0.0, 0.0]
  radius: 1.0

mapping:
  map_type: gnn_mpnn
  domain_restriction: 1.0
  use_shirley_chiu: false
  strict_boundary_fit: false
  learn_global_scale: false
  map_params:
    hidden_dim: 32
    num_layers: 3
    seed: 2

optimization_weights:
  validity_method: alternating_projection
  n_proj_iters: 100

training:
  num_epochs: 1000
  learning_rate: 0.01
  optimizer: "adam"
  lr_schedule: "cosine"
  geometric_loss_type: "boundary_vertices"
  grad_clip: 1.0

loss_weights:
  chamfer: 5000.0
  coverage: 1.0
  material_area: 0.0
  stretching: 1.0
  shearing: 10.0
  bending: 0.0
  contact: 0.0
  regularization: 0.0001
  hinge_gap: 200.0
  openness: 0.0
  deformation: 0.0
  void_closure: 100.0
  closure_delta: 50.0

visualization:
  stage0: true
  stage1: true
  stage2: true
  energy_plot: true
  animation: true
  show_plots: false
  save_outputs: true
  show_hinges: true
  show_hinge_indices: false
  show_external_forces: true
  show_kinematic_blocks: true
