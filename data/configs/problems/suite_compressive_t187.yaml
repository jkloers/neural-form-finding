# Compressive suite — t187 variant
# Identical to suite_compressive.yaml except c001 uses force=15.0 to match
# the exact t187 search configuration (seed 7, trial 187, Run 3, 2026-06-05).
# All other problems retain their original load magnitudes.

physics_defaults:
  use_contact: true
  linearized_strains: true
  updated_lagrangian: false
  k_contact: 5000.0
  min_angle: 1.0
  cutoff_angle: 5.0
  incremental: true
  num_load_steps: 5
  solver_maxiter: 1000
  solver_tol: 1.0e-5

material_defaults:
  k_stretch: 1000.0
  k_shear: 1000.0
  k_rot: 0.5
  density: 1.0

problems:

  # ── EASY — hub-clamped, moment at 1-hop neighbor  (force=15 to match t187) ─
  - id: "c001"
    name: "hub_clamp_moment_1hop"
    description: |
      Clamp hub 9 (TL, rigid pivot).
      CCW moment on hub 12 — its direct 1-hop neighbor.
      Force=15.0 matches the t187 search config exactly.
    difficulty: 11
    boundary_conditions:
      clamped_faces: [9]
    loads:
      - type: global_frame
        face: 12
        dof: 2
        value: 15.0

  # ── EASY — 4-hub alternating moments (swirling closing mode) ─────────────
  - id: "c002"
    name: "four_hub_alternating_moments"
    description: |
      No clamped tile — self-equilibrating alternating moments (net M = 0).
      Alternating moments on all 4 hub tiles.
    difficulty: 30
    boundary_conditions:
      clamped_faces: []
    loads:
      - type: global_frame
        face: 9
        dof: 2
        value: 5.0
      - type: global_frame
        face: 7
        dof: 2
        value: 5.0
      - type: global_frame
        face: 12
        dof: 2
        value: -5.0
      - type: global_frame
        face: 2
        dof: 2
        value: -5.0

  # ── EASY — hub-clamped, compression at 1-hop neighbor ────────────────────
  - id: "c003"
    name: "hub_clamp_compress_1hop"
    description: |
      Clamp hub 9 (TL, rigid pivot).
      Bilateral compression between face 8 and hub 9.
    difficulty: 11
    boundary_conditions:
      clamped_faces: [9]
    loads:
      - type: tile_to_tile
        source_face: 8
        target_face: 9
        magnitude: -5.0

  # ── MEDIUM — hub-12 clamped, horizontal squeeze row 1 ────────────────────
  - id: "c004"
    name: "hub12_clamp_horizontal_squeeze"
    description: |
      Clamp hub 12 (TR, rigid pivot).
      Bilateral compression between face 6 and face 3.
    difficulty: 22
    boundary_conditions:
      clamped_faces: [12]
    loads:
      - type: tile_to_tile
        source_face: 6
        target_face: 3
        magnitude: -5.0

  # ── MEDIUM — corner-clamped (same quadrant), moment + downward load ───────
  - id: "c005"
    name: "corner_clamp_moment_plus_downward"
    description: |
      Clamp corner 14 (TR, degree-2).
      CCW moment on hub 12 + downward force on face 3.
    difficulty: 16
    boundary_conditions:
      clamped_faces: [14]
    loads:
      - type: global_frame
        face: 12
        dof: 2
        value: 5.0
      - type: global_frame
        face: 3
        dof: 1
        value: -5.0

  # ── MEDIUM — corner-clamped opposite quadrant, 4-hop ─────────────────────
  - id: "c006"
    name: "corner_clamp_opposite_quad_moment"
    description: |
      Clamp corner 0 (BL, degree-2).
      CCW moment on hub 12 (TR hub), 4-hop load path.
    difficulty: 20
    boundary_conditions:
      clamped_faces: [0]
    loads:
      - type: global_frame
        face: 12
        dof: 2
        value: 5.0

  # ── MEDIUM — corner-11 clamped, far compression ───────────────────────────
  - id: "c007"
    name: "corner11_clamp_compress_far"
    description: |
      Clamp corner 11 (TL corner, degree-2).
      Bilateral compression between corner 14 and hub 12.
    difficulty: 22
    boundary_conditions:
      clamped_faces: [11]
    loads:
      - type: tile_to_tile
        source_face: 14
        target_face: 12
        magnitude: -5.0

  # ── HARD — X-shaped diagonal squeeze, clamp corner 11 ────────────────────
  - id: "c008"
    name: "diagonal_squeeze_clamp11"
    description: |
      Clamp corner 11 (TL corner, degree-2).
      Two bilateral compressions forming an X squeeze.
    difficulty: 42
    boundary_conditions:
      clamped_faces: [11]
    loads:
      - type: tile_to_tile
        source_face: 14
        target_face: 0
        magnitude: -5.0
      - type: tile_to_tile
        source_face: 5
        target_face: 11
        magnitude: -5.0

  # ── HARD — hub-7 clamped, CCW moments on all neighbors ───────────────────
  - id: "c009"
    name: "hub7_clamp_neighbor_moments"
    description: |
      Clamp hub 7 (BR hub, degree-4).
      CCW moments on all four neighbors of hub 7: faces 12, 2, 6, 4.
    difficulty: 28
    boundary_conditions:
      clamped_faces: [7]
    loads:
      - type: global_frame
        face: 12
        dof: 2
        value: 5.0
      - type: global_frame
        face: 2
        dof: 2
        value: 5.0
      - type: global_frame
        face: 6
        dof: 2
        value: 5.0
      - type: global_frame
        face: 4
        dof: 2
        value: 5.0

  # ── HARDEST — clamp 8, top-edge horizontal squeeze ────────────────────────
  - id: "c010"
    name: "top_edge_squeeze_clamp8"
    description: |
      Clamp connector 8 (col0/row2).
      Bilateral horizontal squeeze: face 11 (TL) ↔ face 14 (TR).
    difficulty: 28
    boundary_conditions:
      clamped_faces: [8]
    loads:
      - type: tile_to_tile
        source_face: 11
        target_face: 14
        magnitude: -5.0
